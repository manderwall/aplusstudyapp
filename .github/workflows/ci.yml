name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Syntax-check JS sources
        run: |
          node --check app.js
          node --check lib.mjs
          node --check sw.js
      - name: Validate questions.json (Core 1)
        run: node scripts/validate-questions.mjs data/questions.json
      - name: Validate questions.json (Core 2)
        run: node scripts/validate-questions.mjs data/core2/questions.json
      - name: Unit tests
        run: node --test tests/pure.test.mjs tests/crypto.test.mjs
