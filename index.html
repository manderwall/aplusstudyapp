<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="A+ Study">
  <meta name="theme-color" content="#1a1a1a">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="styles.css">
  <title>A+ Study</title>
</head>
<body>
  <div id="app">
    <header>
      <h1 id="mode-title">Loading…</h1>
      <div class="header-right">
        <div id="progress-hud"></div>
        <button id="help-btn" type="button" aria-label="Help / welcome" title="Help & options">❓</button>
        <button id="focus-btn" type="button" aria-label="Toggle focus mode" title="Focus mode — press F">🔒</button>
        <button id="theme-btn" type="button" aria-label="Toggle theme" title="Theme (auto/light/dark) — press T">🌓</button>
      </div>
    </header>

    <main id="main"></main>

    <nav id="tabbar">
      <button data-mode="study" class="tab active">
        <span class="tab-icon">📚</span>
        <span class="tab-label">Study</span>
      </button>
      <button data-mode="quiz" class="tab">
        <span class="tab-icon">❓</span>
        <span class="tab-label">Quiz</span>
      </button>
      <button data-mode="reading" class="tab">
        <span class="tab-icon">📖</span>
        <span class="tab-label">Reading</span>
      </button>
      <button data-mode="stats" class="tab">
        <span class="tab-icon">📊</span>
        <span class="tab-label">Stats</span>
      </button>
    </nav>
  </div>

  <script src="app.js" type="module"></script>
</body>
</html>
